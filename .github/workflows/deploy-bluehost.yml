# Builds the single-file app fresh from src/ on every push to main, runs the test suite, and (if
# that passes) FTPs just the two files a visitor actually needs — index.html and .htaccess — up to
# BlueHost's public_html. Nothing else in this repo (src/, tests/, engine/, ...) goes public.
#
# One-time setup, in this repo's GitHub Settings -> Secrets and variables -> Actions:
#   BLUEHOST_FTP_SERVER    e.g. ftp.elorah.org (find the exact host in BlueHost's cPanel -> FTP Accounts)
#   BLUEHOST_FTP_USERNAME  the FTP account's username
#   BLUEHOST_FTP_PASSWORD  the FTP account's password
#
# If your FTP account doesn't land in public_html by default, adjust server-dir below to match.
name: Deploy to BlueHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the single-file app from src/
        run: python3 build/build.py

      - name: Run the test suite
        run: node tests/test.js

      - name: Prepare the two files that actually go live
        run: |
          mkdir -p deploy
          cp dist/shape_of_music.html deploy/index.html
          cp dist/.htaccess deploy/.htaccess

      - name: Deploy to BlueHost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BLUEHOST_FTP_SERVER }}
          username: ${{ secrets.BLUEHOST_FTP_USERNAME }}
          password: ${{ secrets.BLUEHOST_FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ./public_html/
